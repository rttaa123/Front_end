<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>《你的名字》主题js效果作业-饶甜甜</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- 字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/css.css">
</head>
<body>

    <div id="background"></div>

    <main class="main-container">
        
        <!-- Logo 左上角 -->
        <div class="logo-container">
            <img class="logo" src="images/logo.png" alt="Logo">
        </div>
        
        <nav class="navbar">
            <div class="nav-indicator"></div>
            
            <div class="nav-item active" data-index="0" data-bg="images/s100.jpg" data-carousel='["images/1.1.jpg","images/1.11.png","images/1.3.jpg","images/1.4.png","images/1.8.jpg"]'>
                <img class="nav-icon" src="images/联结.png" alt="联结图标">
                <span>联结</span>
            </div>
            <div class="nav-item" data-index="1" data-bg="images/s6.jpg" data-carousel='["images/2.1.jpg","images/2.5.png","images/2.2.1.png","images/2.6.png","images/2.3.png"]'>
                <img class="nav-icon" src="images/追逐.png" alt="追寻图标">
                <span>追寻</span>
            </div>
            <div class="nav-item" data-index="2" data-bg="images/s15.jpg" data-carousel='["images/3.14.png","images/3.1.png","images/3.1.1.png","images/3.15.png","images/3.5.png"]'>
                <img class="nav-icon" src="images/真相.png" alt="真相图标">
                <span>真相</span>
            </div>
            <div class="nav-item" data-index="3" data-bg="images/s8.png" data-carousel='["images/4.10.png","images/4.8.jpeg","images/4.7.png","images/4.11.png","images/4.12.png"]'>
                <img class="nav-icon" src="images/救赎.png" alt="救赎图标">
                <span>救赎</span>
            </div>
            <div class="nav-item" data-index="4" data-bg="images/s111.jpg" data-carousel='["images/5.2.png","images/5.6.png","images/5.png","images/5.4.png","images/5.5.png"]'>
                <img class="nav-icon" src="images/轮回.png" alt="重逢图标">
                <span>重逢</span>
            </div>
        </nav>

        <section class="content-area">
        <!-- 左侧信息卡片 -->
            <div class="info-card">
                <h2 id="card-title">当前篇章</h2>
                <div class="divider"></div>
                <p id="description-text">
                    东京少年泷与乡间少女三叶，某日起在梦境中不定期互换身体。他们用手机日记沟通，以对方的身份体验截然不同的人生，从慌乱到默契，对彼此产生了模糊而深刻的情感联结。
                </p>
            </div>
            
            <!-- 轮播图 -->
            <div class="carousel-wrapper">
                <div class="carousel-container">
                    <div class="carousel-axis">
                        <div class="carousel-item"><img src="" alt="Img1"></div>
                        <div class="carousel-item"><img src="" alt="Img2"></div>
                        <div class="carousel-item"><img src="" alt="Img3"></div>
                        <div class="carousel-item"><img src="" alt="Img4"></div>
                        <div class="carousel-item"><img src="" alt="Img5"></div>
                    </div>
                </div>
                <!-- 指示器箭头 -->
                <div class="carousel-controls">
                    <button class="carousel-btn carousel-prev">
                        <img src="images/左边.png" alt="上一张">
                    </button>
                    <div class="carousel-indicators"></div>
                    <button class="carousel-btn carousel-next">
                        <img src="images/右边.png" alt="下一张">
                    </button>
                </div>
            </div>

        </section>

        <!-- 右下角音乐图标 -->
        <div class="music-control">
            <button class="music-btn" id="music-btn">
                <img class="music-icon" src="images/音乐.png" alt="音乐图标">
            </button>
        </div>
            <!-- 因版权原因,没有下载动画电影主题音乐,暂时注释掉音乐功能 -->
            <!-- 
            <audio id="background-music" loop>
                <source src="" type="audio/mpeg">
                后续添加MP4音频路径
            </audio>
            -->
    </main>

    <script src="js/script.js"></script>
</body>
</html>
